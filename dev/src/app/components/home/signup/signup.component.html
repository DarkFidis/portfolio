<div fxLayout="column" class="py-5" fxLayoutAlign="center center">
  <mat-card>
    <mat-card-title>Inscription</mat-card-title>
    <mat-card-content>
      <form [formGroup]="signinForm" fxLayout="column" fxLayoutGap="15px" fxLayoutAlign="center center">
        <mat-form-field>
          <input matInput type="text" formControlName="username" placeholder="Nom">
        </mat-form-field>
        <mat-form-field>
          <input matInput type="email" formControlName="email" placeholder="Email">
        </mat-form-field>
        <mat-form-field>
          <input matInput type="password" formControlName="password" placeholder="Mot de passe">
        </mat-form-field>
        <button mat-raised-button color="primary" (click)="trySignup()">Inscription</button>
      </form>
    </mat-card-content>
  </mat-card>

</div>
